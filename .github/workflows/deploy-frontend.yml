# Builds the frontend and publishes it to GitHub Pages on every push to main.
#
# One-time setup (all from github.com, phone-friendly):
#   1. Settings -> Secrets and variables -> Actions -> New repository secret:
#        VITE_SUPABASE_URL       = https://pavqdzgvwmbykcqfxosi.supabase.co
#        VITE_SUPABASE_ANON_KEY  = <your anon / legacy public key>  (browser-safe)
#   2. Settings -> Pages -> Build and deployment -> Source: "GitHub Actions"
#
# After that, every merge to main rebuilds and publishes the live app at:
#   https://mistancevic.github.io/AI-opportunity-discovery-Graph/

name: Deploy Frontend

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
