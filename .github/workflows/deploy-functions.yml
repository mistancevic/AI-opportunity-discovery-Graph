# Auto-deploys all Supabase Edge Functions when changes land on main.
#
# One-time setup: add a repository secret named SUPABASE_ACCESS_TOKEN
# (GitHub repo -> Settings -> Secrets and variables -> Actions -> New
# repository secret) containing a Supabase access token from
# https://supabase.com/dashboard/account/tokens
#
# After that, merging a PR that touches supabase/functions/ deploys
# automatically - no terminal, no CLI, no token re-export.

name: Deploy Edge Functions

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
  workflow_dispatch: # manual "Run workflow" button as a fallback

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PROJECT_REF: pavqdzgvwmbykcqfxosi
    steps:
      - uses: actions/checkout@v5

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy all functions
        run: supabase functions deploy --project-ref "$PROJECT_REF"
